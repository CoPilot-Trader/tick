services:
  # TimescaleDB - Time-series optimized PostgreSQL
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: tick-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tick_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tick_password}
      POSTGRES_DB: ${POSTGRES_DB:-tick_db}
    ports:
      - "5433:5432"
    volumes:
      - tick_timescale_data:/var/lib/postgresql/data
      - ./backend/infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tick_user} -d ${POSTGRES_DB:-tick_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tick_network

  # Redis - Caching layer for features and sentiment
  redis:
    image: redis:7-alpine
    container_name: tick-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - tick_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tick_network

  # Backend API - FastAPI multi-agent system
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tick-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tick_user}:${POSTGRES_PASSWORD:-tick_password}@timescaledb:5432/${POSTGRES_DB:-tick_db}
      - REDIS_URL=redis://redis:6379/0
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - TIINGO_API_KEY=${TIINGO_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tick_network

  # Frontend - Next.js dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: tick-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - tick_network

volumes:
  tick_timescale_data:
  tick_redis_data:

networks:
  tick_network:
    driver: bridge
