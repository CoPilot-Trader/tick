server {
  listen ${PORT} default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reasonable defaults for a static docs site
  sendfile on;
  tcp_nopush on;
  gzip on;
  gzip_types text/css application/javascript text/html image/svg+xml;
  gzip_min_length 256;

  # Cache assets (CSS) aggressively, HTML lightly so edits are visible fast
  location ~* \.css$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  # SPA-like fallback so milestones/* deep links work even if extensions are stripped
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Health endpoint for Cloud Run probes
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
