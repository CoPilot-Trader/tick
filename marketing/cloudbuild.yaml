# Cloud Build config for the TICK marketing site.
# NEXT_PUBLIC_* values are baked into the bundle at build time, so
# overriding them here is the lever that decides where "Open dashboard"
# CTAs point in production. Defaults target the VM at 34.55.207.164.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_DASHBOARD_URL=${_NEXT_PUBLIC_DASHBOARD_URL}
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, '${_IMAGE}']

images:
  - ${_IMAGE}

substitutions:
  # Default registry path matches the convention already used in the
  # epesya project (alongside marky-marketing, agentic-home). Override
  # _IMAGE for other projects, e.g.
  #   --substitutions=_IMAGE=gcr.io/copilot-ai-trader/tick-marketing:latest
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tick-marketing:latest
  _NEXT_PUBLIC_API_URL: http://34.55.207.164:8000
  _NEXT_PUBLIC_DASHBOARD_URL: http://34.55.207.164:3000

options:
  logging: CLOUD_LOGGING_ONLY
