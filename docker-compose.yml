services:
  # TimescaleDB - Time-series optimized PostgreSQL
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: tick-db
    environment:
      POSTGRES_USER: tick_user
      POSTGRES_PASSWORD: tick_password
      POSTGRES_DB: tick_db
    ports:
      - "5433:5432"
    volumes:
      - tick_timescale_data:/var/lib/postgresql/data
      - ./backend/infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tick_user -d tick_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tick_network

  # Redis - Caching layer for features and sentiment
  redis:
    image: redis:7-alpine
    container_name: tick-redis
    ports:
      - "6380:6379"
    volumes:
      - tick_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tick_network

  # Backend API - FastAPI multi-agent system
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tick-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://tick_user:tick_password@timescaledb:5432/tick_db
      - REDIS_URL=redis://redis:6379/0
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-d5d3rmpr01qvl80nhh40d5d3rmpr01qvl80nhh4g}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-6fd53b5d6c584a2d9052bcf48988d9be}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-2JSGRZ6R9VRMW7OL}
      - TIINGO_API_KEY=${TIINGO_API_KEY:-9e7e7ef41ad8cefe4bfa3f57e7bb60b5d81e3d14}
      - FMP_API_KEY=${FMP_API_KEY:-W8Qj3LfEWEh5EGBo8gBlCQ4QNT36rZ8j}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv
    networks:
      - tick_network

  # Frontend - Next.js dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be passed at BUILD time (baked into JS bundle).
        # Override via .env or shell: NEXT_PUBLIC_API_URL=http://34.55.207.164:8000 docker compose build frontend
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: tick-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - tick_network

volumes:
  tick_timescale_data:
  tick_redis_data:

networks:
  tick_network:
    driver: bridge
